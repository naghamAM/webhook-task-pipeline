services:
  postgres:
    image: postgres:16
    container_name: webhook-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhook_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    container_name: webhook-migrate
    command: ["node", "dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/webhook_pipeline"

  server:
    build:
      context: .
    container_name: webhook-server
    command: ["node", "dist/server.js"]
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/webhook_pipeline"
      PORT: "3000"

  worker:
    build:
      context: .
    container_name: webhook-worker
    command: ["node", "dist/worker/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/webhook_pipeline"
      PORT: "3001"
      WORKER_POLL_INTERVAL_MS: "1000"

volumes:
  postgres_data:
